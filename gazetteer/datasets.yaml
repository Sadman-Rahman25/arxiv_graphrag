# Datasets gazetteer for arXiv GraphRAG project.
# Each entry: canonical id (lowercase, snake_case) -> metadata.
# Categories (task_type semantics):
#   multi_hop_qa         - multi-step reasoning over multiple docs
#   open_domain_qa       - single-fact QA over a large corpus
#   retrieval_benchmark  - measures retrieval quality directly
#   rag_benchmark        - measures end-to-end RAG quality
#   domain_specific      - medical, financial, legal, scientific
#   dialog_qa            - conversational QA
#   fact_verification    - claim verification tasks
#   long_context         - tests long-context reasoning
#   general_eval         - broad LLM benchmarks (MMLU etc.)
#   summarization        - summarization datasets

# =============================================================================
